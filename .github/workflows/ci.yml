name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  precheck:
    name: Pre-check (fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  check-and-test:
    name: Check & Test
    needs: [precheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb1-dev libx11-dev libxi-dev libxtst-dev libxkbcommon-dev \
            libgtk-3-dev libatk1.0-dev libcairo2-dev libglib2.0-dev libpango1.0-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev pkg-config

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo (registry + target)
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features

  release:
    name: Build & Release Windows Beta
    needs: [check-and-test]
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Create Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-beta.${{ github.run_number }}
          name: Chronos Beta v0.1.0-beta.${{ github.run_number }}
          body: |
            Automatic Beta Release for Chronos (Build #${{ github.run_number }}).
            
            ### Download / Téléchargement
            - **[chronos.exe (Windows)](https://github.com/${{ github.repository }}/releases/download/v0.1.0-beta.${{ github.run_number }}/chronos.exe)**
          prerelease: true
          files: target/release/chronos.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
